name: Release

# Builds the Electron launcher and publishes the installer + the electron-updater feed
# (latest.yml) to a GitHub Release when a vX.Y.Z tag is pushed.
#
# v1.0.0 ships the Windows build (the stated primary target). To also publish macOS/Linux,
# add `macos-latest` and `ubuntu-latest` back to the matrix below.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        # os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json "packageManager" — do NOT also pass `version`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @pilote/types --filter @pilote/core build

      - name: Build & publish launcher
        working-directory: apps/client
        run: pnpm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notarization secrets are optional; left unset = unsigned build.
          CSC_IDENTITY_AUTO_DISCOVERY: false
